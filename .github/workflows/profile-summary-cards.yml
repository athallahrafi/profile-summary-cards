name: GitHub Profile Summary Cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate

    steps:
      - uses: actions/checkout@v3
      
      # Menggunakan fork aktif milik yoshi389111
      - uses: yoshi389111/github-profile-summary-cards@v0.7.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
