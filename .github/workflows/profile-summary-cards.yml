name: GitHub Profile Summary Cards

on:
  schedule:
    # Mengupdate statistik secara otomatis setiap 24 jam
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate

    steps:
      - uses: actions/checkout@v3
      
      # Menggunakan fork komunitas yang aktif dan stabil
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
        # Jika ingin menggunakan alternatif generator summary card yang persis:
      - uses: actions-cool/profile-summary-cards@v2.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
